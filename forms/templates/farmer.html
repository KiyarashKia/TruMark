<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmer | TruMark SC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #121212; color: #fff; }
    .form-control, .form-select {
      background-color: #1e1e1e;
      border: 1px solid #444;
      color: #fff;
    }
    .form-control::placeholder {
      color: #aaa;
    }
  </style>
</head>
<body class="py-5">
  <div class="container">
    <a href="login.html" class="text-decoration-none"> <button type="submit" class="btn mt-3 btn-warning">Home</button></a>
    <h2 class="mb-4 fw-bold text-center">🧑‍🌾 Farmer Data Entry</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info" role="alert">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form action="{{ url_for('submit_farmer') }}" method="post">
      <div class="mb-3">
        <label class="form-label" for="upc">UPC</label>
        <input type="text" class="form-control" id="upc" name="upc" placeholder="Enter UPC" required/>
      </div>
      <div class="mb-3">
        <label class="form-label" for="lot">LOT / Batch (PK)</label>
        <input type="text" class="form-control" id="lot" name="lot" placeholder="Enter batch number" required/>
      </div>
      <div class="mb-3">
        <label class="form-label" for="date_of_production">Date of Production</label>
        <input type="date" class="form-control" id="date_of_production" name="date_of_production" required/>
      </div>
      <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <select class="form-select" id="category" name="category" required>
          <option value="">Select category</option>
          <option>Vegetables</option>
          <option>Fruits</option>
          <option>Grains</option>
          <option>Dairy</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label" for="signature">Signature</label>
        <input type="text" class="form-control" id="signature" name="signature" placeholder="Authorized person" style="width: 25%;" required/>
      </div>
      <button type="submit" class="btn btn-success w-100">Submit</button>
    </form>
  </div>
</body>
</html>
