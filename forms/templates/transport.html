<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transport | TruMark SC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #121212; color: #fff; }
    .form-control, .form-select {
      background-color: #1e1e1e;
      border: 1px solid #444;
      color: #fff;
    }
  </style>
</head>
<body class="py-5">
  <div class="container">
    <a href="/index.html" class="text-decoration-none"> <button type="submit" class="btn mt-3 btn-warning">Home</button></a>
    <h2 class="mb-4 fw-bold text-center">🚚 Transport Info</h2>
    <form>
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">LOT / Batch (FK)</label>
        <input type="text" class="form-control" placeholder="Enter batch number" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Transportation Standards</label>
        <textarea class="form-control" rows="3" placeholder="Standards followed..." required></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label">Signature</label>
        <input type="text" class="form-control" placeholder="Authorized person" style="width: 25%;" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
  </div>
</body>
</html>
