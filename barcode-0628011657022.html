<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruMark test barcode — 0628011657022</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: #f3f3f5;
        color: #1c1c1c;
        padding: 32px;
      }
      h1 { font-size: 18px; font-weight: 600; margin: 0; }
      p { margin: 0; color: #727279; font-size: 14px; text-align: center; max-width: 360px; }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 32px 40px;
        box-shadow: 0 4px 6px rgba(16, 24, 40, 0.1), 0 2px 4px rgba(16, 24, 40, 0.06);
        /* High contrast + quiet zone help the scanner lock on fast. */
      }
      svg { display: block; }
      .err { color: #c42525; }
    </style>
  </head>
  <body>
    <h1>Scan this with TruMark</h1>
    <div class="card">
      <svg id="barcode"></svg>
    </div>
    <p>
      EAN-13 · <strong>0628011657022</strong> — Micro Verdure Microgreens
      (live CFIA recall). For best results, raise screen brightness and hold the
      camera ~15&nbsp;cm away.
    </p>
    <p id="status" class="err" style="display: none"></p>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script>
      function render() {
        try {
          JsBarcode("#barcode", "0628011657022", {
            format: "EAN13",
            width: 3, // bar width — wider scans more reliably off a screen
            height: 140,
            displayValue: true,
            fontSize: 20,
            margin: 16,
            background: "#ffffff",
            lineColor: "#000000",
          });
        } catch (e) {
          const s = document.getElementById("status");
          s.style.display = "block";
          s.textContent = "Couldn't render barcode (offline?). Connect to the internet and reload.";
        }
      }
      if (window.JsBarcode) render();
      else window.addEventListener("load", render);
    </script>
  </body>
</html>
